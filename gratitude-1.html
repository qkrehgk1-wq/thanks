<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>감사 일기</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="감사일기">
<meta name="theme-color" content="#5c3d2e">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6f0;
  --warm: #f5ede0;
  --gold: #c8963e;
  --gold-light: #e8b86d;
  --brown: #5c3d2e;
  --brown-light: #8b6855;
  --text: #2c1810;
  --text-soft: #7a5c4a;
  --white: #ffffff;
  --shadow: rgba(92, 61, 46, 0.12);
  --accent: #d4845a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Decorative background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(200,150,62,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(212,132,90,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  background: var(--brown);
  color: var(--cream);
  text-align: center;
  padding: 20px 20px 18px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(44,24,16,0.25);
}

header .title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.15em;
}

header .subtitle {
  font-size: 11px;
  color: var(--gold-light);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: 3px;
  opacity: 0.8;
}

/* CONTAINER */
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
  position: relative;
  z-index: 1;
}

/* STREAK */
.streak-card {
  background: linear-gradient(135deg, var(--brown) 0%, #8b5e3c 100%);
  color: var(--cream);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 6px 24px var(--shadow);
  animation: fadeSlideIn 0.4s ease;
}

.streak-icon { font-size: 28px; }

.streak-text strong {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 18px;
  display: block;
}

.streak-text span {
  font-size: 11px;
  opacity: 0.7;
  letter-spacing: 0.05em;
}

/* SECTION TITLE */
.section-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: 0.1em;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--gold-light), transparent);
}

/* INPUT CARD */
.input-card {
  background: var(--white);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 20px var(--shadow);
  animation: fadeSlideIn 0.4s ease;
}

.gratitude-input-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream);
  border-radius: 12px;
  padding: 4px 12px 4px 4px;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,150,62,0.1);
}

.input-num {
  width: 28px; height: 28px;
  background: var(--gold);
  color: white;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.input-row input {
  border: none;
  background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  color: var(--text);
  flex: 1;
  padding: 10px 0;
  outline: none;
}

.input-row input::placeholder { color: #bba898; }

.mood-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.mood-label {
  font-size: 12px;
  color: var(--text-soft);
  white-space: nowrap;
  font-weight: 500;
}

.mood-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 4px;
  background: linear-gradient(to right, var(--gold) 0%, var(--gold) 50%, #e0d0c0 50%);
  outline: none;
}

.mood-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(200,150,62,0.4);
  border: 3px solid white;
}

.mood-value {
  width: 30px;
  text-align: center;
  font-weight: 700;
  color: var(--gold);
  font-size: 16px;
  font-family: 'Nanum Myeongjo', serif;
}

.save-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--brown) 0%, #7a4e3a 100%);
  color: var(--cream);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(92,61,46,0.3);
}

.save-btn:active { transform: scale(0.98); }

.save-btn:hover { box-shadow: 0 6px 20px rgba(92,61,46,0.4); }

/* ENTRY CARD */
.entry-card {
  background: var(--white);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow);
  animation: fadeSlideIn 0.3s ease;
  border-left: 3px solid var(--gold);
}

.entry-date {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.entry-mood-badge {
  background: var(--warm);
  color: var(--gold);
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 700;
}

.entry-items {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.entry-item {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  padding-left: 14px;
  position: relative;
}

.entry-item::before {
  content: '•';
  position: absolute;
  left: 2px;
  color: var(--gold);
}

.delete-btn {
  background: transparent;
  border: 1px solid #e8d5c8;
  color: var(--text-soft);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
}

.delete-btn:hover { background: #fff0f0; border-color: #e88; color: #c44; }

/* MEMORY CARD */
.memory-card {
  background: linear-gradient(135deg, #fffbf3, #fff7ec);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px dashed var(--gold-light);
}

.memory-badge {
  display: inline-block;
  background: var(--gold);
  color: white;
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* RECORDS PAGE */
.search-box {
  display: flex;
  align-items: center;
  background: var(--white);
  border-radius: 12px;
  padding: 4px 14px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 16px;
  border: 1.5px solid transparent;
  transition: border-color 0.2s;
}

.search-box:focus-within { border-color: var(--gold); }

.search-box span { color: var(--text-soft); font-size: 16px; margin-right: 8px; }

.search-box input {
  border: none;
  background: transparent;
  flex: 1;
  padding: 12px 0;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
}

.search-box input::placeholder { color: #bba898; }

/* CALENDAR */
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.cal-nav-btn {
  background: var(--white);
  border: 1px solid #e8d5c8;
  color: var(--brown);
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.cal-nav-btn:hover { background: var(--warm); }

.cal-month-label {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--brown);
}

.cal-grid {
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 20px var(--shadow);
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--brown);
}

.cal-weekday {
  padding: 10px 4px;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  color: rgba(250,246,240,0.7);
  letter-spacing: 0.05em;
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 8px;
  gap: 4px;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 13px;
  color: var(--text-soft);
  transition: all 0.2s;
  cursor: default;
}

.cal-day.has-entry {
  background: var(--gold);
  color: white;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(200,150,62,0.35);
}

.cal-day.today {
  border: 2px solid var(--gold);
  color: var(--gold);
  font-weight: 700;
}

.cal-day.today.has-entry { color: white; }

.cal-day.empty { opacity: 0; pointer-events: none; }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.stat-card {
  background: var(--white);
  border-radius: 16px;
  padding: 18px 16px;
  box-shadow: 0 2px 12px var(--shadow);
  text-align: center;
  animation: fadeSlideIn 0.4s ease;
}

.stat-card.wide {
  grid-column: 1 / -1;
}

.stat-icon { font-size: 24px; margin-bottom: 6px; }

.stat-value {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-soft);
  letter-spacing: 0.05em;
}

.keyword-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}

.keyword-tag {
  background: var(--warm);
  color: var(--brown);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
}

/* SETTINGS */
.settings-card {
  background: var(--white);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 2px 12px var(--shadow);
}

.settings-card h3 {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 16px;
  color: var(--brown);
  margin-bottom: 12px;
}

.settings-btn {
  width: 100%;
  background: var(--warm);
  color: var(--brown);
  border: 1px solid #e8d5c8;
  border-radius: 12px;
  padding: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.settings-btn:hover { background: #eedfc8; }

.file-input-wrapper {
  position: relative;
  overflow: hidden;
}

.file-input-wrapper input[type="file"] {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0;
  cursor: pointer;
  font-size: 100px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  display: flex;
  border-top: 1px solid #ecddd3;
  z-index: 100;
  box-shadow: 0 -4px 20px var(--shadow);
}

.nav-btn {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px 4px 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: all 0.2s;
  color: var(--text-soft);
}

.nav-btn.active { color: var(--gold); }

.nav-btn svg { width: 20px; height: 20px; }

.nav-btn span {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.05em;
}

/* HIDDEN / PAGE */
.page { display: none; animation: fadeSlideIn 0.35s ease; }
.page.active { display: block; }

/* ANIMATIONS */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--brown);
  color: var(--cream);
  border-radius: 24px;
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-soft);
}

.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

.empty-state p {
  font-size: 13px;
  line-height: 1.7;
  opacity: 0.7;
}
</style>
</head>
<body>

<header>
  <div class="title">감 사 일 기</div>
  <div class="subtitle">Gratitude Journal</div>
</header>

<div class="container">

  <!-- HOME PAGE -->
  <div id="page-home" class="page active">
    <div class="streak-card" id="streak-card">
      <div class="streak-icon">🔥</div>
      <div class="streak-text">
        <strong id="streak-num">0일 연속</strong>
        <span>꾸준히 기록 중이에요</span>
      </div>
    </div>

    <div class="section-title">오늘의 감사</div>
    <div class="input-card">
      <div class="gratitude-input-group">
        <div class="input-row">
          <div class="input-num">1</div>
          <input id="g1" placeholder="첫 번째 감사한 일">
        </div>
        <div class="input-row">
          <div class="input-num">2</div>
          <input id="g2" placeholder="두 번째 감사한 일">
        </div>
        <div class="input-row">
          <div class="input-num">3</div>
          <input id="g3" placeholder="세 번째 감사한 일">
        </div>
      </div>
      <div class="mood-row">
        <span class="mood-label">오늘 기분</span>
        <input type="range" class="mood-slider" id="moodSlider" min="1" max="10" value="5">
        <div class="mood-value" id="moodVal">5</div>
      </div>
      <button class="save-btn" onclick="save()">저 장 하 기</button>
    </div>

    <div id="memories-section" style="display:none">
      <div class="section-title">과거 오늘</div>
      <div id="memories"></div>
    </div>
  </div>

  <!-- RECORDS PAGE -->
  <div id="page-records" class="page">
    <div class="search-box">
      <span>🔍</span>
      <input id="search" placeholder="기록 검색..." oninput="searchRecords()">
    </div>
    <div id="list"></div>
  </div>

  <!-- CALENDAR PAGE -->
  <div id="page-calendar" class="page">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month-label" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">일</div>
        <div class="cal-weekday">월</div>
        <div class="cal-weekday">화</div>
        <div class="cal-weekday">수</div>
        <div class="cal-weekday">목</div>
        <div class="cal-weekday">금</div>
        <div class="cal-weekday">토</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>

  <!-- STATS PAGE -->
  <div id="page-stats" class="page">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📖</div>
        <span class="stat-value" id="statTotal">0</span>
        <div class="stat-label">총 기록 일수</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">😊</div>
        <span class="stat-value" id="statMood">-</span>
        <div class="stat-label">평균 기분</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <span class="stat-value" id="statStreak">0</span>
        <div class="stat-label">현재 연속 기록</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✨</div>
        <span class="stat-value" id="statTotal3">0</span>
        <div class="stat-label">총 감사 항목</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-icon">🏷️</div>
        <div class="stat-label" style="margin-bottom:0">자주 등장한 키워드</div>
        <div class="keyword-tags" id="statKeywords"></div>
      </div>
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div id="page-settings" class="page">
    <div class="settings-card">
      <h3>💾 데이터 백업</h3>
      <button class="settings-btn" onclick="backup()">JSON 파일로 백업 다운로드</button>
    </div>
    <div class="settings-card">
      <h3>📂 데이터 복원</h3>
      <div class="file-input-wrapper">
        <button class="settings-btn">백업 파일 선택하여 복원</button>
        <input type="file" accept=".json" onchange="restore(event)">
      </div>
    </div>
    <div class="settings-card">
      <h3>ℹ️ 앱 정보</h3>
      <p style="font-size:13px; color:var(--text-soft); line-height:1.7">
        감사 일기는 매일 3가지 감사한 일을 기록하는 앱입니다.<br>
        모든 데이터는 이 기기에 안전하게 저장됩니다.
      </p>
    </div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span>홈</span>
  </button>
  <button class="nav-btn" onclick="showPage('records')" id="nav-records">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
    <span>기록</span>
  </button>
  <button class="nav-btn" onclick="showPage('calendar')" id="nav-calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>달력</span>
  </button>
  <button class="nav-btn" onclick="showPage('stats')" id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>통계</span>
  </button>
  <button class="nav-btn" onclick="showPage('settings')" id="nav-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>설정</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────
function getData() {
  return JSON.parse(localStorage.getItem("gratitude") || "[]");
}
function saveData(data) {
  localStorage.setItem("gratitude", JSON.stringify(data));
}

// ─── MOOD SLIDER ────────────────────────────────
const slider = document.getElementById("moodSlider");
const moodVal = document.getElementById("moodVal");
slider.addEventListener("input", () => {
  moodVal.textContent = slider.value;
  const pct = ((slider.value - 1) / 9) * 100;
  slider.style.background = `linear-gradient(to right, #c8963e 0%, #c8963e ${pct}%, #e0d0c0 ${pct}%)`;
});

// ─── TOAST ──────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ─── SAVE ───────────────────────────────────────
function save() {
  const g1 = document.getElementById("g1").value.trim();
  const g2 = document.getElementById("g2").value.trim();
  const g3 = document.getElementById("g3").value.trim();
  if (!g1 && !g2 && !g3) { showToast("감사한 일을 입력해주세요 🌿"); return; }
  const entry = {
    id: Date.now(),
    date: new Date().toISOString(),
    g1, g2, g3,
    mood: parseInt(slider.value)
  };
  const data = getData();
  data.unshift(entry);
  saveData(data);
  document.getElementById("g1").value = "";
  document.getElementById("g2").value = "";
  document.getElementById("g3").value = "";
  slider.value = 5; moodVal.textContent = "5";
  slider.style.background = "linear-gradient(to right, #c8963e 0%, #c8963e 50%, #e0d0c0 50%)";
  showToast("저장했습니다 ✨");
  loadAll();
}

// ─── DELETE ─────────────────────────────────────
function deleteEntry(id) {
  if (!confirm("이 기록을 삭제할까요?")) return;
  let data = getData().filter(e => e.id != id);
  saveData(data);
  loadAll();
  showToast("삭제했습니다");
}

// ─── STREAK ─────────────────────────────────────
function calcStreak() {
  const data = getData();
  const dates = [...new Set(data.map(e => e.date.split("T")[0]))].sort().reverse();
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < dates.length; i++) {
    const diff = Math.floor((today - new Date(dates[i])) / 86400000);
    if (diff === streak) streak++;
    else break;
  }
  return streak;
}

function loadStreak() {
  const s = calcStreak();
  document.getElementById("streak-num").textContent = s + "일 연속";
  document.getElementById("statStreak").textContent = s;
}

// ─── HOME MEMORIES ──────────────────────────────
function loadMemories() {
  const data = getData();
  const today = new Date();
  const m = today.getMonth(), d = today.getDate();
  const past = data.filter(e => {
    const dt = new Date(e.date);
    return dt.getMonth() === m && dt.getDate() === d &&
           today.getFullYear() - dt.getFullYear() > 0;
  });
  const sec = document.getElementById("memories-section");
  if (!past.length) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  document.getElementById("memories").innerHTML = past.map(e => {
    const diff = today.getFullYear() - new Date(e.date).getFullYear();
    return `<div class="memory-card">
      <div class="memory-badge">${diff}년 전 오늘</div>
      <div class="entry-items">
        ${e.g1 ? `<div class="entry-item">${e.g1}</div>` : ""}
        ${e.g2 ? `<div class="entry-item">${e.g2}</div>` : ""}
        ${e.g3 ? `<div class="entry-item">${e.g3}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ─── RECORDS ────────────────────────────────────
function renderEntries(data) {
  if (!data.length) {
    document.getElementById("list").innerHTML = `
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>아직 기록이 없어요.<br>오늘의 감사를 적어보세요.</p>
      </div>`;
    return;
  }
  document.getElementById("list").innerHTML = data.map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString("ko-KR", {year:"numeric",month:"long",day:"numeric",weekday:"short"});
    return `<div class="entry-card">
      <div class="entry-date">
        <span>${dateStr}</span>
        ${e.mood ? `<span class="entry-mood-badge">기분 ${e.mood}</span>` : ""}
      </div>
      <div class="entry-items">
        ${e.g1 ? `<div class="entry-item">${e.g1}</div>` : ""}
        ${e.g2 ? `<div class="entry-item">${e.g2}</div>` : ""}
        ${e.g3 ? `<div class="entry-item">${e.g3}</div>` : ""}
      </div>
      <button class="delete-btn" onclick="deleteEntry(${e.id})">삭제</button>
    </div>`;
  }).join("");
}

function loadRecords() { renderEntries(getData()); }

function searchRecords() {
  const k = document.getElementById("search").value.toLowerCase();
  if (!k) { loadRecords(); return; }
  const filtered = getData().filter(e =>
    (e.g1 && e.g1.toLowerCase().includes(k)) ||
    (e.g2 && e.g2.toLowerCase().includes(k)) ||
    (e.g3 && e.g3.toLowerCase().includes(k))
  );
  renderEntries(filtered);
}

// ─── CALENDAR ───────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderCalendar() {
  const data = getData();
  const days = {};
  data.forEach(e => { days[e.date.split("T")[0]] = true; });

  const today = new Date();
  const label = new Date(calYear, calMonth, 1).toLocaleDateString("ko-KR", {year:"numeric", month:"long"});
  document.getElementById("calMonthLabel").textContent = label;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = "";
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const hasEntry = days[key];
    html += `<div class="cal-day ${hasEntry?"has-entry":""} ${isToday?"today":""}">${d}</div>`;
  }
  document.getElementById("calDays").innerHTML = html;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

// ─── STATS ──────────────────────────────────────
function loadStats() {
  const data = getData();
  document.getElementById("statTotal").textContent = data.length;
  document.getElementById("statTotal3").textContent = data.reduce((acc, e) =>
    acc + [e.g1,e.g2,e.g3].filter(Boolean).length, 0);

  const moods = data.filter(e => e.mood).map(e => e.mood);
  document.getElementById("statMood").textContent =
    moods.length ? (moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1) : "-";

  const words = {};
  data.forEach(e => {
    [e.g1, e.g2, e.g3].forEach(t => {
      if (!t) return;
      t.split(/\s+/).forEach(w => {
        if (w.length < 2) return;
        words[w] = (words[w] || 0) + 1;
      });
    });
  });
  const top = Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0, 8);
  document.getElementById("statKeywords").innerHTML = top.length
    ? top.map(([w]) => `<span class="keyword-tag">${w}</span>`).join("")
    : `<span style="font-size:13px;color:var(--text-soft);opacity:0.6">아직 데이터가 없어요</span>`;
}

// ─── PAGE NAV ───────────────────────────────────
const pages = ["home","records","calendar","stats","settings"];
function showPage(name) {
  pages.forEach(p => {
    document.getElementById("page-"+p).classList.remove("active");
    document.getElementById("nav-"+p).classList.remove("active");
  });
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("nav-"+name).classList.add("active");

  if (name === "calendar") renderCalendar();
  if (name === "stats") loadStats();
  if (name === "records") loadRecords();
}

// ─── BACKUP / RESTORE ───────────────────────────
function backup() {
  const blob = new Blob([JSON.stringify(getData(), null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gratitude_backup_" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  showToast("백업 완료 💾");
}

function restore(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error();
      saveData(data);
      loadAll();
      showToast("복원 완료 ✅");
    } catch { showToast("파일 형식이 올바르지 않아요"); }
  };
  reader.readAsText(file);
}

// ─── LOAD ALL ───────────────────────────────────
function loadAll() {
  loadStreak();
  loadMemories();
  loadRecords();
  loadStats();
  renderCalendar();
}

loadAll();
</script>
</body>
</html>
